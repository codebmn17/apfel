name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Active SDK: $(xcrun --show-sdk-version)"
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Build
        run: swift build -c release

      - name: Unit tests
        run: swift run apfel-tests

      # Integration tests run locally via `make preflight` and `make release`.
      # GitHub-hosted macos-26 runners are Intel with no Apple Intelligence,
      # so model-dependent integration tests cannot run here.
      # CI validates: build + 362 unit tests. Full qualification is local.
